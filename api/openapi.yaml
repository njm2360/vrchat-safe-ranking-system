openapi: "3.0.3"
info:
  title: VRChat Ranking System API
  version: "1.0.0"
  description: |
    VRChat Udon クライアントから呼び出す HTTP API と、
    Discord OAuth による登録フローを提供します。

    ## 認証モデル

    - `/save` `/load`はSipHash署名で保護される。`jwt`クエリはオプション。
    - `display_name`がDBに未登録ならJWTなしで通る (署名のみ検証)。
    - `display_name`が登録済みならJWT必須。`display_name`がJWT
      クレームと一致し、JTIが当該ユーザーの現行JTIかつブラックリスト未登録
      でなければ`401`。
    - 署名鍵はUdon側に埋め込まれており抽出可能。クエリ書き換えや
      ロード応答MITM改ざんを検知するライト層対策であり、鍵抽出を伴う
      高度な攻撃はスコープ外。登録済みDisplayNameはJWTで本人検証
      されるため、鍵漏洩時も正規ユーザーは自分のスコアを守れる。

    ## 署名仕様

    SipHash-2-4 (16バイト鍵、64bitタグ) を使用する。タグは lowercase hex で
    16文字。複数パートは 1 バイトの `0x00` で区切って連結する。

    | 場面 | メッセージ | 鍵 |
    | ---- | ---------- | --- |
    | `/save` リクエスト sig | `<data raw bytes> ‖ 0x00 ‖ <display_name bytes>` | `SAVE_SECRET` |
    | `/load` リクエスト sig | `<display_name bytes>` | `LOAD_SECRET` |
    | `/load` レスポンス sig | レスポンス内 `data` の raw bytes | `LOAD_SECRET` |

paths:
  /save:
    get:
      operationId: SaveData
      summary: セーブデータを保存する
      description: |
        SipHash-2-4 署名付きのセーブデータをサーバーに記録します。
        `jwt` は登録済み `display_name` に対してのみ必須。
      parameters:
        - name: display_name
          in: query
          required: true
          schema:
            type: string
          description: VRChat 表示名 (JWT を付ける場合は `display_name` クレームと一致必須)
        - name: data
          in: query
          required: true
          schema:
            type: string
          description: |
            `SaveData` を JSON 化したもの (URL エンコード必要)。
        - name: sig
          in: query
          required: true
          schema:
            type: string
          description: SipHash-2-4(SAVE_SECRET, data ‖ 0x00 ‖ display_name) の lowercase hex (16文字)
        - name: jwt
          in: query
          required: false
          schema:
            type: string
          description: 認証 JWT。`display_name` が登録済みの場合は必須
      responses:
        "200":
          description: 保存成功
          content:
            text/plain:
              schema:
                type: string
                example: success
        "400":
          description: |
            パラメータ不正 (display_name / data / sig 未指定または不正)、
            sig 検証失敗、`data` の JSON パース失敗、
            または `generated_at` が許容ウィンドウ外
        "401":
          description: |
            display_name が登録済みで JWT 未指定 / 無効 / 失効 / クレームと不一致
        "409":
          description: 同一 display_name で同一 generated_at が既に保存済み
        "500":
          description: サーバー内部エラー

  /load:
    get:
      operationId: LoadData
      summary: 最新のセーブデータを取得する
      description: |
        指定 `display_name` の最新セーブデータと、レスポンスボディの完全性を
        証明する SipHash 署名を返します。
        `jwt` は登録済み `display_name` に対してのみ必須。
      parameters:
        - name: display_name
          in: query
          required: true
          schema:
            type: string
          description: VRChat 表示名 (JWT を付ける場合は `display_name` クレームと一致必須)
        - name: sig
          in: query
          required: true
          schema:
            type: string
          description: SipHash-2-4(LOAD_SECRET, display_name) の lowercase hex (16文字)
        - name: jwt
          in: query
          required: false
          schema:
            type: string
          description: 認証 JWT。`display_name` が登録済みの場合は必須
      responses:
        "200":
          description: セーブデータと署名
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoadResponse"
        "400":
          description: パラメータ不正 (display_name / sig 未指定) または sig 検証失敗
        "401":
          description: |
            display_name が登録済みで JWT 未指定 / 無効 / 失効 / クレームと不一致
        "404":
          description: セーブデータが存在しない
        "500":
          description: サーバー内部エラー

  /ranking:
    get:
      operationId: GetRanking
      summary: ランキングを取得する
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 1000
          description: 取得件数 (デフォルト 10)
        - name: verified
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: |
            `true` のとき JWT 認証付きで保存されたエントリのみを返す。
            省略時は署名のみのエントリも含む。
      responses:
        "200":
          description: ランキング一覧 (該当なしのときは空配列)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RankingRow"
        "400":
          description: limit が範囲外、または verified が `true` / `false` 以外
        "500":
          description: サーバー内部エラー

  /auth/start:
    get:
      operationId: AuthStart
      summary: OAuth 認証フローを開始する
      description: |
        Discord OAuth フローを開始し、プロバイダの認可ページへリダイレクトします。
        MockOAuth モードが有効な場合は `/auth/mock-login` へリダイレクトします。
      parameters:
        - name: display_name
          in: query
          required: true
          schema:
            type: string
          description: 登録したい VRChat 表示名
        - name: sig
          in: query
          required: true
          schema:
            type: string
          description: |
            `SipHash-2-4(AUTH_SECRET, <display_name の raw bytes>)` の lowercase hex (16文字)
        - name: fake_discord_id
          in: query
          required: false
          schema:
            type: string
          description: |
            (Mock OAuth モード専用) 18 桁の数字。省略時はランダムな snowflake を生成。
        - name: fake_username
          in: query
          required: false
          schema:
            type: string
          description: |
            (Mock OAuth モード専用) Discord ユーザー名の代替。省略時は `display_name` を流用。
      responses:
        "302":
          description: OAuth プロバイダ (または `/auth/mock-login`) へリダイレクト
        "400":
          description: display_name / sig が未指定または不正
        "403":
          description: 表示名が BAN 済
        "500":
          description: サーバー内部エラー

  /auth/callback:
    get:
      operationId: AuthCallback
      summary: OAuth コールバックを処理する
      description: |
        OAuth プロバイダからのコールバックを受け取り、Discord ユーザー情報を取得して
        単発使用のセッション Cookie (`vsrs_portal_session`, Path=`/auth`, HttpOnly)
        を発行した上で `/auth/portal` へ 303 リダイレクトします。
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: OAuth state トークン
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: OAuth 認可コード
      responses:
        "303":
          description: |
            `/auth/portal` へリダイレクト。`Set-Cookie: vsrs_portal_session=...` を伴う。
          headers:
            Set-Cookie:
              schema:
                type: string
              description: vsrs_portal_session=<token>; Path=/auth; HttpOnly; SameSite=Lax
        "400":
          description: state / code が不正または期限切れ
        "403":
          description: Discord アカウントが BAN 済
        "429":
          description: OAuth プロバイダ側のレート制限
        "502":
          description: Discord 認証に失敗
        "500":
          description: サーバー内部エラー

  /auth/portal:
    get:
      operationId: GetAuthPortal
      summary: 認証ポータルページを表示する
      description: |
        `vsrs_portal_session` Cookie を検証し、当該ユーザーの登録状態に応じた
        ポータル HTML を返します。Cookie は消費しないのでリロード可。
      parameters:
        - in: cookie
          name: vsrs_portal_session
          required: true
          schema:
            type: string
          description: /auth/callback で発行されたセッショントークン
      responses:
        "200":
          description: ポータル HTML ページ
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Cookie 未送信 / 不明 / 期限切れ
        "500":
          description: サーバー内部エラー

  /auth/register:
    post:
      operationId: AuthRegister
      summary: 登録を実行する
      description: |
        `vsrs_portal_session` Cookie を **消費** して VRChat 表示名と Discord
        アカウントを紐付けます。既存の登録がある場合は JWT を再発行します
        (旧 JWT は失効)。成功すると JWT を含む結果 HTML ページを返します。
      parameters:
        - in: cookie
          name: vsrs_portal_session
          required: true
          schema:
            type: string
          description: /auth/callback で発行されたセッショントークン (単発使用)
      responses:
        "200":
          description: 結果 HTML ページ (登録完了 / トークン再発行)
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Cookie 未送信 / 不明 / 期限切れ
        "403":
          description: Discord アカウントまたは表示名が BAN 済
        "409":
          description: 表示名が別アカウントで使用中
        "500":
          description: サーバー内部エラー

  /auth/unregister:
    post:
      operationId: AuthUnregister
      summary: 登録解除を実行する
      description: |
        `vsrs_portal_session` Cookie を **消費** して登録を解除します。
        現在の JWT を失効させ、ランキングから削除します。
        users レコードは保持され、表示名の予約は維持されます。
        成功すると結果 HTML ページを返します。
      parameters:
        - in: cookie
          name: vsrs_portal_session
          required: true
          schema:
            type: string
          description: /auth/callback で発行されたセッショントークン (単発使用)
      responses:
        "200":
          description: 登録解除完了 HTML ページ
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Cookie 未送信 / 不明 / 期限切れ
        "403":
          description: Discord アカウントが BAN 済
        "404":
          description: 登録されていないアカウント
        "500":
          description: サーバー内部エラー

components:
  schemas:
    SaveData:
      type: object
      required: [score, generated_at]
      properties:
        score:
          type: integer
          format: int64
          description: スコア
        generated_at:
          type: string
          format: date-time
          description: |
            セーブ生成時刻 (RFC3339)。サーバ時刻に対し `-7d ～ +5min` の範囲外は
            `/save` で `400` 拒否される。同一 display_name で同一値の重複保存は
            `409`。

    LoadResponse:
      type: object
      required: [data, sig]
      properties:
        data:
          $ref: "#/components/schemas/SaveData"
        sig:
          type: string
          description: |
            `SipHash-2-4(LOAD_SECRET, <data の raw JSON bytes>)` の lowercase hex (16文字)。
            Udon 側で検証することでロード応答の MITM 改ざんを検知できる。

    RankingRow:
      type: object
      required: [rank, display_name, score, updated_at, verified]
      properties:
        rank:
          type: integer
          description: 順位 (1 始まり)
        display_name:
          type: string
          description: VRChat 表示名
        score:
          type: integer
          format: int64
          description: スコア
        updated_at:
          type: string
          format: date-time
          description: 最終更新日時
        verified:
          type: boolean
          description: |
            セーブが JWT 認証下で行われたか (= `save_history.jti IS NOT NULL`)。
            署名のみで保存されたエントリは `false`。
