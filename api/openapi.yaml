openapi: "3.0.3"
info:
  title: VRChat Ranking System API
  version: "1.0.0"
  description: |
    VRChat Udon クライアントから呼び出す HTTP API と、
    Discord OAuth による登録フローを提供します。

paths:
  /save:
    get:
      operationId: SaveData
      summary: セーブデータを保存する
      description: HMAC-SHA256 署名付きのセーブデータをサーバーに記録します。
      parameters:
        - name: jwt
          in: query
          required: true
          schema:
            type: string
          description: 認証JWT
        - name: display_name
          in: query
          required: true
          schema:
            type: string
          description: VRChat 表示名（JWT の display_name クレームと一致する必要あり）
        - name: data
          in: query
          required: true
          schema:
            type: string
          description: セーブデータ（JSON）
        - name: sig
          in: query
          required: true
          schema:
            type: string
          description: HMAC-SHA256(data, display_name) の署名
      responses:
        "200":
          description: 保存成功
          content:
            text/plain:
              schema:
                type: string
                example: success
        "400":
          description: パラメータ不正（display_name / data / sig 未指定）、sig 検証失敗、またはデータ形式エラー
        "401":
          description: JWT が無効・失効済み、または display_name が JWT と不一致
        "500":
          description: サーバー内部エラー

  /load:
    get:
      operationId: LoadData
      summary: 最新のセーブデータを取得する
      description: ログインユーザーの最新セーブデータとHMAC署名を返します。
      parameters:
        - name: jwt
          in: query
          required: true
          schema:
            type: string
          description: 認証JWT
        - name: display_name
          in: query
          required: true
          schema:
            type: string
          description: VRChat 表示名（JWT の display_name クレームと一致する必要あり）
        - name: sig
          in: query
          required: true
          schema:
            type: string
          description: HMAC-SHA256(display_name) の署名
      responses:
        "200":
          description: セーブデータと署名
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoadResponse"
        "400":
          description: パラメータ不正（display_name / sig 未指定）または sig 検証失敗
        "401":
          description: JWT が無効・失効済み、または display_name が JWT と不一致
        "404":
          description: セーブデータが存在しない
        "500":
          description: サーバー内部エラー

  /ranking:
    get:
      operationId: GetRanking
      summary: ランキングを取得する
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 1000
          description: 取得件数（デフォルト 10）
      responses:
        "200":
          description: ランキング一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RankingRow"
        "500":
          description: サーバー内部エラー

  /auth/start:
    get:
      operationId: AuthStart
      summary: OAuth 認証フローを開始する
      description: |
        Discord OAuth フローを開始し、プロバイダの認可ページへリダイレクトします。
        MockOAuth モードが有効な場合は /auth/mock-login へリダイレクトします。
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: ユーザー名
      responses:
        "302":
          description: OAuthプロバイダへリダイレクト
        "400":
          description: 名前が未指定または無効な文字を含む

  /auth/callback:
    get:
      operationId: AuthCallback
      summary: OAuthコールバックを処理する
      description: |
        OAuthプロバイダからのコールバックを受け取り、
        ユーザー情報を取得してポータルページへリダイレクトします。
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: OAuth state トークン
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: OAuth認可コード
      responses:
        "303":
          description: ポータルページへリダイレクト
        "400":
          description: state / code が不正または期限切れ
        "403":
          description: アカウントが利用禁止
        "502":
          description: サーバー内部エラー

  /auth/portal:
    get:
      operationId: GetAuthPortal
      summary: 認証ポータルページを表示する
      description: セッショントークンに対応するポータルHTMLを返します。
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: セッショントークン
      responses:
        "200":
          description: ポータルHTMLページ
          content:
            text/html:
              schema:
                type: string
        "400":
          description: トークンが未指定、不明、または期限切れ


  /auth/register:
    post:
      operationId: AuthRegister
      summary: 登録を実行する
      description: |
        セッショントークンを消費して VRChat 表示名とアカウントを紐付けます。
        既存の登録がある場合は JWT を再発行します（旧 JWT は失効）。
        成功すると JWT を含む結果 HTML ページを返します。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: セッショントークン
      responses:
        "200":
          description: 結果HTMLページ（登録完了 / トークン再発行）
          content:
            text/html:
              schema:
                type: string
        "400":
          description: リクエスト不正またはセッション期限切れ
        "403":
          description: アカウントが利用禁止
        "409":
          description: ユーザー名が別アカウントで使用中
        "500":
          description: サーバー内部エラー

  /auth/unregister:
    post:
      operationId: AuthUnregister
      summary: 登録解除を実行する
      description: |
        セッショントークンを消費して登録を解除します。
        現在の JWT を失効させ、ランキングから削除します。
        users レコードは保持され、表示名の予約は維持されます。
        成功すると結果 HTML ページを返します。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: セッショントークン
      responses:
        "200":
          description: 登録解除完了 HTML ページ
          content:
            text/html:
              schema:
                type: string
        "400":
          description: リクエスト不正またはセッション期限切れ
        "403":
          description: アカウントが利用禁止
        "404":
          description: 登録されていないアカウント
        "500":
          description: サーバー内部エラー

components:
  schemas:
    SaveData:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          format: int64
          description: スコア

    LoadResponse:
      type: object
      required: [data, sig]
      properties:
        data:
          $ref: "#/components/schemas/SaveData"
        sig:
          type: string
          description: dataのHMAC-SHA256 署名

    RankingRow:
      type: object
      required: [rank, display_name, score, updated_at]
      properties:
        rank:
          type: integer
          description: 順位
        display_name:
          type: string
          description: ユーザー名
        score:
          type: integer
          format: int64
          description: スコア
        updated_at:
          type: string
          format: date-time
          description: 最終更新日時
