<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アカウントポータル</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f3f4f6;
    }

    .site-header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.875rem 0;
      margin-bottom: 2rem;
    }

    .section-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 0.75rem;
    }

    .username-value {
      font-size: 1.35rem;
      font-weight: 700;
      color: #111827;
    }

    .token-block {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.875rem 1rem;
      font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
      font-size: 0.75rem;
      line-height: 1.7;
      word-break: break-all;
      white-space: pre-wrap;
      color: #374151;
    }

    .token-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container" style="max-width:640px">
      <span class="fw-bold fs-6 text-dark">アカウントポータル</span>
    </div>
  </header>

  <div class="container" style="max-width:640px">

    <div class="alert rounded-3 py-2 mb-3 alert-success" role="alert">
      {{.Heading}}
    </div>

    <div class="section-card">
      <div class="section-label">VRChatユーザー名</div>
      <div class="d-flex align-items-center gap-2 mb-3">
        <div class="username-value">{{.DisplayName}}</div>
        <span class="badge rounded-pill text-bg-success" style="font-size:0.68rem;font-weight:600">登録済み</span>
      </div>
      <div class="section-label">トークン</div>
      <div class="token-meta">
        <span class="text-muted" style="font-size:0.8rem">ワールド内のテキストボックスに貼り付けてください</span>
        <button onclick="copyToken(this)" class="btn btn-sm btn-outline-secondary" style="font-size:0.75rem;padding:0.2rem 0.65rem">コピー</button>
      </div>
      <div id="jwt-token" class="token-block">{{.JWT}}</div>
    </div>

  </div>

  <script>
    function copyToken(btn) {
      navigator.clipboard.writeText(document.getElementById('jwt-token').textContent.trim()).then(function () {
        btn.textContent = 'コピーしました';
        btn.classList.replace('btn-outline-secondary', 'btn-success');
        setTimeout(function () {
          btn.textContent = 'コピー';
          btn.classList.replace('btn-success', 'btn-outline-secondary');
        }, 2000);
      });
    }
  </script>
</body>

</html>
