<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discordログイン</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f3f4f6;
    }

    .site-header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.875rem 0;
      margin-bottom: 2rem;
    }

    .section-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 0.75rem;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container" style="max-width:640px">
      <span class="fw-bold fs-6 text-dark">Discordログイン</span>
    </div>
  </header>

  <div class="container" style="max-width:640px">
    <div class="section-card">
      <div class="section-label">Discord ID</div>
      <form method="POST" action="/auth/mock-login">
        <input type="hidden" name="state" value="{{.State}}">
        <input type="hidden" name="username" value="{{.Username}}">
        <div class="d-flex gap-2 mb-3">
          <input id="discord-id-input" type="text" name="discord_id" class="form-control font-monospace"
            value="{{.DiscordID}}" required pattern="[0-9]+" inputmode="numeric" autocomplete="off">
          <button type="button" class="btn btn-outline-secondary text-nowrap" onclick="fillRandom()">ランダム生成</button>
        </div>
        <button type="submit" class="btn btn-primary w-100">ログイン</button>
      </form>
    </div>
  </div>

  <script>
    function fillRandom() {
      var digits = '123456789'[Math.floor(Math.random() * 9)];
      for (var i = 0; i < 17; i++) {
        digits += Math.floor(Math.random() * 10);
      }
      document.getElementById('discord-id-input').value = digits;
    }
  </script>
</body>

</html>
